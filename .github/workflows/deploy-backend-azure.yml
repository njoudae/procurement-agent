name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "procurement-agent/backend/**"
      - ".github/workflows/deploy-backend-azure.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ProcurementAgentSystem
  BACKEND_PACKAGE_PATH: procurement-agent/backend
  IMAGE_NAME: ghcr.io/njoudae/procurement-agent-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_PACKAGE_PATH }}
          file: ${{ env.BACKEND_PACKAGE_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Deploy container to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE_NAME }}:${{ github.sha }}
